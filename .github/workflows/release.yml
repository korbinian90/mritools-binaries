name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Cache cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binaries (native)
        if: "!matrix.use_cross"
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Build release binaries (cross)
        if: matrix.use_cross
        run: cross build --workspace --release --target ${{ matrix.target }}

      - name: Create release archive (Linux / macOS)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          ARCHIVE="mritools-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          BINARIES="romeo clearswi mcpc3ds makehomogeneous romeo_mask"
          tar -czf "$ARCHIVE" -C "$BIN_DIR" $BINARIES
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create release archive (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $BIN_DIR = "target/${{ matrix.target }}/release"
          $ARCHIVE = "mritools-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $binaries = @("romeo.exe","clearswi.exe","mcpc3ds.exe","makehomogeneous.exe","romeo_mask.exe")
          $paths = $binaries | ForEach-Object { Join-Path $BIN_DIR $_ }
          Compress-Archive -Path $paths -DestinationPath $ARCHIVE
          echo "ARCHIVE=$ARCHIVE" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
